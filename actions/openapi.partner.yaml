openapi: 3.1.0
info:
  title: Partner Intake OS Partner-Facing Actions API
  version: 1.0.0-partner-planning
  description: Future partner-facing OpenAPI planning spec. Do not import this into the production Custom GPT. Use actions/openapi.production.yaml for the production operator GPT. This partner spec is intentionally narrow and excludes Tally webhook and admin routes.
  contact:
    name: Moonshine Capital / Partner Command Center
servers:
  - url: https://YOUR_PARTNER_API_DOMAIN.vercel.app
    description: Future partner-facing API domain or route namespace.
security:
  - bearerAuth: []
tags:
  - name: System
    description: Health and system status endpoints.
  - name: Partner Resources
    description: Limited partner-facing resource and campaign support.
  - name: Partner Lead Intake
    description: Future partner lead submission and attribution support. Review-based only.
paths:
  /api/health:
    get:
      operationId: checkHealth
      tags: [System]
      summary: Check API health
      security: []
      responses:
        "200":
          description: Health response.
  /api/partners/recommend-resources:
    post:
      operationId: recommendPartnerResources
      tags: [Partner Resources]
      summary: Recommend partner resources
      description: Partner-facing safe operation. Keep output narrow and avoid internal risk/debug details.
      responses:
        "200":
          description: Resource recommendations.
  /api/partners/generate-campaign-kit:
    post:
      operationId: generatePartnerCampaignKit
      tags: [Partner Resources]
      summary: Generate a campaign kit
      description: Partner-facing safe operation. Generated copy requires review before publication.
      responses:
        "200":
          description: Campaign kit response.
  /api/leads/submit:
    post:
      operationId: submitPartnerLead
      tags: [Partner Lead Intake]
      summary: Submit a partner-sourced lead for review
      description: Implemented review-based route. Do not use as a funding, approval, lender review, or outcome guarantee endpoint.
      x-partner-intake-status: live_review_based
      x-gpt-production-import-safe: false
      responses:
        "202":
          description: Lead received for review.
  /api/tracking/create-link:
    post:
      operationId: createTrackingLink
      tags: [Partner Lead Intake]
      summary: Create a tracking link
      description: Implemented deterministic stub. Does not persist tracking records yet.
      x-partner-intake-status: stub
      x-gpt-production-import-safe: false
      responses:
        "200":
          description: Tracking link generated.
  /api/tracking/log-event:
    post:
      operationId: logTrackingEvent
      tags: [Partner Lead Intake]
      summary: Log a tracking event
      description: Implemented event stub. Does not persist attribution events yet.
      x-partner-intake-status: stub
      x-gpt-production-import-safe: false
      responses:
        "200":
          description: Tracking event accepted.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Partner token
