openapi: 3.1.0
info:
  title: Partner Intake OS Production Actions API
  version: 1.0.0-production
  description: Production OpenAPI variant for Partner Intake OS core GPT-facing endpoints. Includes only core routes expected
    from the current API scaffold. Expansion/admin routes are intentionally excluded until implemented and tested.
  contact:
    name: Moonshine Capital / Partner Command Center
servers:
- url: https://YOUR_PRODUCTION_VERCEL_DOMAIN.vercel.app
  description: Production Partner Intake OS Vercel API. Replace this placeholder before importing into a live Custom GPT.
security:
- bearerAuth: []
tags:
- name: System
  description: Health and system status endpoints.
- name: Partner Classification
  description: Classify partner intakes and generate partner operating intelligence.
- name: Partner Activation
  description: Generate resources, onboarding plans, and campaign kits.
- name: Event Logging
  description: Log safe GPT-facing partner events.
- name: Lead Submission
  description: Planned partner lead submission and attribution endpoints.
- name: Admin Review
  description: Planned internal admin review endpoints.
paths:
  /api/health:
    get:
      operationId: checkHealth
      tags:
      - System
      summary: Check Partner Intake OS API health
      description: 'Core endpoint. Returns system status for the Partner Intake OS API.


        Production variant. Use only after replacing placeholder server URL and verifying live routes.'
      security: []
      x-partner-intake-status: core
      responses:
        '200':
          description: System health response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
      x-partner-intake-scope: production
  /api/partners/classify:
    post:
      operationId: classifyPartnerIntake
      tags:
      - Partner Classification
      summary: Classify a partner intake
      description: 'Core endpoint. Accepts normalized intake or manual intake details and returns classification, tier, risk
        level, scorecard, recommendations, and next action.


        Production variant. Use only after replacing placeholder server URL and verifying live routes.'
      x-partner-intake-status: core
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassifyPartnerRequest'
            examples:
              lowInfo:
                $ref: '#/components/examples/LowInfoPartnerIntake'
              fundingBroker:
                $ref: '#/components/examples/FundingBrokerIntake'
              highRisk:
                $ref: '#/components/examples/HighRiskLeadSeller'
      responses:
        '200':
          description: Partner classification result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassificationResult'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Unauthorized. Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
      x-partner-intake-scope: production
  /api/partners/recommend-resources:
    post:
      operationId: recommendPartnerResources
      tags:
      - Partner Activation
      summary: Recommend resources for a partner
      description: 'Core endpoint. Returns resource recommendations based on partner type, audience, tier, and goals.


        Production variant. Use only after replacing placeholder server URL and verifying live routes.'
      x-partner-intake-status: core
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceRecommendationRequest'
      responses:
        '200':
          description: Resource recommendations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceRecommendationResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Unauthorized. Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
      x-partner-intake-scope: production
  /api/partners/generate-onboarding-plan:
    post:
      operationId: generatePartnerOnboardingPlan
      tags:
      - Partner Activation
      summary: Generate a partner onboarding plan
      description: 'Core endpoint. Returns first 24 hours, first 7 days, first 30 days, required assets, training, and next
        action.


        Production variant. Use only after replacing placeholder server URL and verifying live routes.'
      x-partner-intake-status: core
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingPlanRequest'
      responses:
        '200':
          description: Partner onboarding plan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingPlan'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Unauthorized. Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
      x-partner-intake-scope: production
  /api/partners/generate-campaign-kit:
    post:
      operationId: generatePartnerCampaignKit
      tags:
      - Partner Activation
      summary: Generate a partner campaign kit
      description: 'Core endpoint. Returns campaign concept, CTA, suggested channels, tracking notes, copy angle, and compliance
        notes.


        Production variant. Use only after replacing placeholder server URL and verifying live routes.'
      x-partner-intake-status: core
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignKitRequest'
      responses:
        '200':
          description: Partner campaign kit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignKit'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Unauthorized. Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
      x-partner-intake-scope: production
  /api/partners/log-event:
    post:
      operationId: logPartnerEvent
      tags:
      - Event Logging
      summary: Log a partner event
      description: 'Core endpoint. Logs a safe GPT-facing partner event. For MVP this may return mock logged status.


        Production variant. Use only after replacing placeholder server URL and verifying live routes.'
      x-partner-intake-status: core
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogEventRequest'
      responses:
        '200':
          description: Event log confirmation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogEventResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Unauthorized. Missing or invalid Bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
      x-partner-intake-scope: production
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Partner Intake OS Action Token
      description: Configure in the Custom GPT Action editor as API key authentication using Bearer token mode. Use the value
        stored in Vercel as PARTNER_INTAKE_ACTION_TOKEN.
  schemas:
    ApiError:
      type: object
      description: Standard API error response.
      additionalProperties: false
      properties:
        error:
          type: string
          examples:
          - unauthorized
        message:
          type: string
          examples:
          - Missing or invalid Bearer token.
        code:
          type: string
          examples:
          - AUTH_INVALID_TOKEN
        details:
          oneOf:
          - type: object
            additionalProperties: true
          - type: array
            items: {}
          - type: string
          - type: 'null'
        request_id:
          type: string
          pattern: ^req_[A-Za-z0-9_-]{8,80}$
      required:
      - error
      - message
      - code
      - request_id
    HealthResponse:
      type: object
      description: System health response.
      additionalProperties: false
      properties:
        ok:
          type: boolean
        service:
          type: string
          examples:
          - partner-intake-os
        environment:
          type: string
          enum:
          - development
          - preview
          - production
          - test
          - local
        version:
          type: string
          examples:
          - 0.8.0
        timestamp:
          type: string
          format: date-time
      required:
      - ok
      - service
      - environment
      - version
      - timestamp
    PartnerIntake:
      type: object
      description: Normalized partner intake record from Tally, manual review, API, or dashboard entry.
      additionalProperties: false
      properties:
        first_name:
          type: string
          maxLength: 80
        last_name:
          type: string
          maxLength: 80
        email:
          type: string
          format: email
        phone:
          type: string
          maxLength: 40
        company:
          type: string
          maxLength: 160
        website:
          type: string
          format: uri
        partner_type_claimed:
          type: string
        audience:
          type: string
        industry:
          type: string
          maxLength: 120
        location:
          type: string
          maxLength: 160
        funding_experience:
          type: string
        current_tools:
          type: array
          items:
            type: string
          maxItems: 25
        traffic_or_network_size:
          type: string
          maxLength: 160
        referral_volume_estimate:
          type: string
          maxLength: 160
        desired_partner_role:
          type: string
          maxLength: 160
        notes:
          type: string
          maxLength: 5000
        source:
          type: string
          enum:
          - tally
          - manual
          - gpt_action
          - api
          - dashboard
          - hubspot
          - notion
          - google_sheets
          - n8n
          - activepieces
          - unknown
        submitted_at:
          type: string
          format: date-time
      required:
      - email
      - source
    ClassifyPartnerRequest:
      type: object
      description: Request body for classifying a partner intake.
      additionalProperties: false
      properties:
        intake:
          $ref: '#/components/schemas/PartnerIntake'
        context:
          type: string
          enum:
          - manual_review
          - tally_submission
          - gpt_preview_test
          - dashboard_review
          - api_test
          default: manual_review
        include_dashboard_summary:
          type: boolean
          default: true
        include_recommendations:
          type: boolean
          default: true
      required:
      - intake
    Scorecard:
      type: object
      additionalProperties: false
      properties:
        urgency_score:
          type: integer
          minimum: 0
          maximum: 100
        audience_fit_score:
          type: integer
          minimum: 0
          maximum: 100
        trust_score:
          type: integer
          minimum: 0
          maximum: 100
        revenue_potential_score:
          type: integer
          minimum: 0
          maximum: 100
        activation_speed_score:
          type: integer
          minimum: 0
          maximum: 100
        compliance_risk_score:
          type: integer
          minimum: 0
          maximum: 100
          description: Higher score means higher compliance risk.
        strategic_value_score:
          type: integer
          minimum: 0
          maximum: 100
        overall_score:
          type: integer
          minimum: 0
          maximum: 100
        tier_recommendation:
          type: string
          enum:
          - tier_1
          - tier_2
          - tier_3
          - tier_4
          - reject
          - pending
        reasoning_summary:
          type: string
          maxLength: 2000
        manual_review_required:
          type: boolean
      required:
      - overall_score
      - tier_recommendation
      - manual_review_required
    RiskAssessment:
      type: object
      additionalProperties: false
      properties:
        risk_level:
          type: string
          enum:
          - low
          - medium
          - high
          - critical
          - unknown
        risk_flags:
          type: array
          items:
            type: string
            enum:
            - guaranteed_approval_claim
            - guaranteed_funding_amount_claim
            - credit_repair_claim
            - deceptive_urgency
            - lead_quality_unclear
            - unverified_volume_claim
            - possible_spam
            - missing_contact_info
            - general_consumer_not_partner
            - high_compliance_risk
        compliance_flags:
          type: array
          items:
            type: string
        manual_review_required:
          type: boolean
        recommended_mitigation:
          type: string
          maxLength: 2000
      required:
      - risk_level
      - risk_flags
      - manual_review_required
    DashboardSummary:
      type: object
      additionalProperties: false
      properties:
        partner_id:
          type: string
          pattern: ^ptr_[A-Za-z0-9_-]{8,80}$
        display_name:
          type: string
        company:
          type:
          - string
          - 'null'
        partner_type:
          type: string
        partner_tier:
          type: string
        onboarding_path:
          type: string
        status:
          type: string
        risk_level:
          type: string
        overall_score:
          type: integer
          minimum: 0
          maximum: 100
        next_action:
          type: string
        recommended_resources:
          type: array
          items:
            type: string
        recommended_campaigns:
          type: array
          items:
            type: string
        open_tasks_count:
          type: integer
          minimum: 0
        latest_activity:
          type:
          - string
          - 'null'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - partner_id
      - display_name
      - partner_type
      - partner_tier
      - status
      - risk_level
      - next_action
    ClassificationResult:
      type: object
      description: Full classification response returned by Partner Intake OS.
      additionalProperties: false
      properties:
        classification_id:
          type: string
          pattern: ^cls_[A-Za-z0-9_-]{8,80}$
        partner_id:
          type: string
          pattern: ^ptr_[A-Za-z0-9_-]{8,80}$
        intake_source:
          type: string
        partner_type:
          type: string
          enum:
          - funding_broker
          - iso
          - referral_partner
          - cpa_bookkeeper
          - small_business_attorney
          - business_broker
          - real_estate_investor_connector
          - contractor_trades_connector
          - franchise_consultant
          - veteran_community_connector
          - creator_affiliate
          - fintech_vendor_partner
          - strategic_partner
          - unqualified_not_fit
          - unknown
        partner_tier:
          type: string
          enum:
          - tier_1
          - tier_2
          - tier_3
          - tier_4
          - reject
          - pending
        onboarding_path:
          type: string
          enum:
          - fast_track_revenue_partner
          - standard_affiliate_partner
          - referral_only_partner
          - education_first_partner
          - strategic_partner_review
          - nurture_watchlist
          - reject_manual_risk_review
          - pending
        primary_audience:
          type: string
        secondary_audiences:
          type: array
          items:
            type: string
        scorecard_summary:
          $ref: '#/components/schemas/Scorecard'
        risk_assessment:
          $ref: '#/components/schemas/RiskAssessment'
        manual_review_required:
          type: boolean
        recommended_next_action:
          type: string
        recommended_resources:
          type: array
          items:
            type: string
        recommended_campaigns:
          type: array
          items:
            type: string
        crm_fields:
          type: object
          additionalProperties: true
        dashboard_summary:
          $ref: '#/components/schemas/DashboardSummary'
        confidence_score:
          type: integer
          minimum: 0
          maximum: 100
        reasoning_summary:
          type: string
          maxLength: 3000
        created_at:
          type: string
          format: date-time
        model_or_engine_version:
          type: string
      required:
      - partner_type
      - partner_tier
      - onboarding_path
      - risk_assessment
      - manual_review_required
      - recommended_next_action
      - confidence_score
    ResourceRecommendationRequest:
      type: object
      additionalProperties: false
      properties:
        partner_type:
          type: string
        audience:
          type: string
        partner_tier:
          type: string
        risk_level:
          type: string
        goals:
          type: array
          items:
            type: string
        limit:
          type: integer
          minimum: 1
          maximum: 20
          default: 5
      required:
      - partner_type
      - audience
    ResourceRecommendation:
      type: object
      additionalProperties: false
      properties:
        partner_type:
          type: string
        audience:
          type: string
        recommended_resource:
          type: string
        resource_url:
          type:
          - string
          - 'null'
          format: uri
        reason:
          type: string
        cta:
          type: string
        priority:
          type: string
          enum:
          - low
          - medium
          - high
          - urgent
      required:
      - partner_type
      - audience
      - recommended_resource
      - reason
      - cta
      - priority
    ResourceRecommendationResponse:
      type: object
      additionalProperties: false
      properties:
        recommendations:
          type: array
          items:
            $ref: '#/components/schemas/ResourceRecommendation'
        next_action:
          type: string
        request_id:
          type: string
      required:
      - recommendations
      - next_action
    OnboardingPlanRequest:
      type: object
      additionalProperties: false
      properties:
        partner_id:
          type: string
        partner_type:
          type: string
        partner_tier:
          type: string
        onboarding_path:
          type: string
        primary_audience:
          type: string
        risk_level:
          type: string
      required:
      - partner_type
      - partner_tier
      - onboarding_path
    OnboardingPlan:
      type: object
      additionalProperties: false
      properties:
        partner_id:
          type:
          - string
          - 'null'
        onboarding_path:
          type: string
        first_24_hours:
          type: array
          items:
            type: string
        first_7_days:
          type: array
          items:
            type: string
        first_30_days:
          type: array
          items:
            type: string
        required_assets:
          type: array
          items:
            type: string
        recommended_training:
          type: array
          items:
            type: string
        recommended_campaign:
          type: string
        next_action:
          type: string
        owner:
          type: string
      required:
      - onboarding_path
      - first_24_hours
      - first_7_days
      - first_30_days
      - next_action
    CampaignKitRequest:
      type: object
      additionalProperties: false
      properties:
        partner_id:
          type: string
        partner_type:
          type: string
        audience:
          type: string
        offer:
          type: string
        preferred_channels:
          type: array
          items:
            type: string
        tracking_required:
          type: boolean
          default: true
      required:
      - partner_type
      - audience
    CampaignKit:
      type: object
      additionalProperties: false
      properties:
        campaign_id:
          type: string
        partner_id:
          type:
          - string
          - 'null'
        campaign_name:
          type: string
        campaign_type:
          type: string
        audience:
          type: string
        offer:
          type: string
        cta:
          type: string
        channels:
          type: array
          items:
            type: string
        copy_angle:
          type: string
        suggested_assets:
          type: array
          items:
            type: string
        tracking_link:
          oneOf:
          - $ref: '#/components/schemas/TrackingLink'
          - type: 'null'
        launch_checklist:
          type: array
          items:
            type: string
        compliance_notes:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
      required:
      - campaign_name
      - campaign_type
      - audience
      - cta
      - channels
      - compliance_notes
      - status
    LogEventRequest:
      type: object
      additionalProperties: false
      properties:
        partner_id:
          type: string
        event_type:
          type: string
        event_source:
          type: string
          enum:
          - gpt_action
          - api
          - dashboard
          - manual
          - automation
          - integration
        summary:
          type: string
        next_action:
          type: string
        payload:
          type: object
          additionalProperties: true
        created_by:
          type: string
      required:
      - event_type
      - event_source
      - summary
    LogEventResponse:
      type: object
      additionalProperties: false
      properties:
        logged:
          type: boolean
        event_id:
          type: string
        partner_id:
          type:
          - string
          - 'null'
        message:
          type: string
        created_at:
          type: string
          format: date-time
      required:
      - logged
      - event_id
      - message
      - created_at
    LeadSubmission:
      type: object
      description: Intake-only partner lead submission. This does not imply approval, eligibility, or funding certainty.
      additionalProperties: false
      properties:
        submitted_by_partner_id:
          type: string
        tracking_link_id:
          type:
          - string
          - 'null'
        business_name:
          type: string
        contact_name:
          type: string
        contact_email:
          type: string
          format: email
        contact_phone:
          type: string
        industry:
          type: string
        monthly_revenue_range:
          type: string
        time_in_business_range:
          type: string
        funding_need:
          type: string
        funding_amount_requested:
          type: number
          minimum: 0
        use_of_funds:
          type: string
        urgency:
          type: string
          enum:
          - low
          - medium
          - high
          - immediate
        consent_confirmed:
          type: boolean
        notes:
          type: string
        source:
          type: string
        metadata:
          type: object
          additionalProperties: true
      required:
      - submitted_by_partner_id
      - business_name
      - contact_name
      - contact_email
      - funding_need
      - consent_confirmed
      - source
    LeadSubmissionResponse:
      type: object
      additionalProperties: false
      properties:
        lead_id:
          type: string
        accepted:
          type: boolean
        status:
          type: string
        next_action:
          type: string
        assigned_owner:
          type:
          - string
          - 'null'
        missing_fields:
          type: array
          items:
            type: string
        validation_warnings:
          type: array
          items:
            type: string
        partner_visible_message:
          type: string
        internal_message:
          type: string
        created_at:
          type: string
          format: date-time
        request_id:
          type: string
      required:
      - accepted
      - status
      - next_action
      - partner_visible_message
      - created_at
      - request_id
    TrackingLinkRequest:
      type: object
      additionalProperties: false
      properties:
        partner_id:
          type: string
        campaign_id:
          type: string
        destination_url:
          type: string
          format: uri
        slug:
          type: string
        utm_source:
          type: string
        utm_medium:
          type: string
        utm_campaign:
          type: string
        utm_content:
          type: string
      required:
      - partner_id
      - destination_url
      - slug
    TrackingLink:
      type: object
      additionalProperties: false
      properties:
        tracking_link_id:
          type: string
        partner_id:
          type: string
        campaign_id:
          type:
          - string
          - 'null'
        destination_url:
          type: string
          format: uri
        tracking_url:
          type: string
          format: uri
        slug:
          type: string
        utm_source:
          type: string
        utm_medium:
          type: string
        utm_campaign:
          type: string
        utm_content:
          type: string
        status:
          type: string
        created_at:
          type: string
