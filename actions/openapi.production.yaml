openapi: 3.1.0
info:
  title: Partner Intake OS Production Actions API
  version: 1.0.0
  description: Production-safe Custom GPT Action import spec for Partner Intake OS. This spec exposes only safe GPT-facing routes and intentionally excludes Tally webhook, admin, lead submission, tracking, sync, and security endpoints.
  contact:
    name: Moonshine Capital / Partner Command Center
servers:
  - url: https://YOUR_PRODUCTION_VERCEL_DOMAIN.vercel.app
    description: Replace with the deployed Partner Intake OS Vercel domain before importing into a Custom GPT.
security:
  - bearerAuth: []
tags:
  - name: System
    description: Health and system status endpoints.
  - name: Partner Classification
    description: Classify partner intakes and generate partner operating intelligence.
  - name: Partner Activation
    description: Generate resources, onboarding plans, and campaign kits.
  - name: Event Logging
    description: Log safe GPT-facing partner events.
paths:
  /api/health:
    get:
      operationId: checkHealth
      tags: [System]
      summary: Check Partner Intake OS API health
      description: Returns Partner Intake OS API health/status information. No auth required.
      security: []
      responses:
        "200":
          description: System health response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/partners/classify:
    post:
      operationId: classifyPartnerIntake
      tags: [Partner Classification]
      summary: Classify a partner intake
      description: Accepts normalized or manual partner intake details and returns classification, tier, risk flags, scorecard, onboarding path, and next action. No funding, approval, rates, terms, timelines, lender review, commissions, income, or specific business outcome is guaranteed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassifyPartnerRequest"
      responses:
        "200":
          description: Partner classification result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassificationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/partners/recommend-resources:
    post:
      operationId: recommendPartnerResources
      tags: [Partner Activation]
      summary: Recommend resources for a partner
      description: Returns educational and operational resource recommendations based on partner type, audience, tier, and goals.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerContextRequest"
      responses:
        "200":
          description: Resource recommendations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceRecommendationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/partners/generate-onboarding-plan:
    post:
      operationId: generatePartnerOnboardingPlan
      tags: [Partner Activation]
      summary: Generate a partner onboarding plan
      description: Returns first 24 hours, first 7 days, first 30 days, required assets, training, risk flags, and next action.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerContextRequest"
      responses:
        "200":
          description: Partner onboarding plan.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingPlanResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/partners/generate-campaign-kit:
    post:
      operationId: generatePartnerCampaignKit
      tags: [Partner Activation]
      summary: Generate a partner campaign kit
      description: Returns a campaign concept, CTA, suggested channels, tracking notes, copy angle, and compliance notes. Generated copy must be reviewed before public use.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerContextRequest"
      responses:
        "200":
          description: Partner campaign kit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignKitResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/partners/log-event:
    post:
      operationId: logPartnerEvent
      tags: [Event Logging]
      summary: Log a partner event
      description: Logs safe GPT-facing partner workflow events. MVP implementations may return non-persistent stub confirmation until storage is wired.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogEventRequest"
      responses:
        "200":
          description: Event log confirmation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogEventResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Partner Intake OS Action Token
      description: Configure the Custom GPT Action as API key authentication using Bearer token mode. Store the matching value in Vercel as PARTNER_INTAKE_ACTION_TOKEN.
  responses:
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Unauthorized:
      description: Unauthorized. Missing or invalid Bearer token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    InternalServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
  schemas:
    ApiError:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: string
        message:
          type: string
        code:
          type: string
        request_id:
          type: string
      required: [error, message, code]
    HealthResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
        status:
          type: string
        service:
          type: string
        environment:
          type: string
        version:
          type: string
        timestamp:
          type: string
          format: date-time
      required: [ok, service, timestamp]
    PartnerIntake:
      type: object
      additionalProperties: true
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        company:
          type: string
        website:
          type: string
        partner_type_claimed:
          type: string
        audience:
          type: string
        industry:
          type: string
        location:
          type: string
        funding_experience:
          type: string
        current_tools:
          oneOf:
            - type: array
              items:
                type: string
            - type: string
        traffic_or_network_size:
          type: string
        referral_volume_estimate:
          type: string
        desired_partner_role:
          type: string
        notes:
          type: string
        source:
          type: string
          enum: [tally, manual, gpt_action, api, dashboard, hubspot, notion, google_sheets, n8n, activepieces, unknown]
        submitted_at:
          type: string
          format: date-time
    ClassifyPartnerRequest:
      type: object
      additionalProperties: true
      properties:
        intake:
          $ref: "#/components/schemas/PartnerIntake"
        context:
          type: string
        return_format:
          type: string
          enum: [summary, full, json]
      required: [intake]
    PartnerContextRequest:
      type: object
      additionalProperties: true
      properties:
        partner_id:
          type: string
        partner_type:
          type: string
        partner_tier:
          type: string
        onboarding_path:
          type: string
        audience:
          type: string
        intake:
          $ref: "#/components/schemas/PartnerIntake"
        notes:
          type: string
    ClassificationResult:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
        partner_profile:
          type: object
          additionalProperties: true
        scorecard:
          type: object
          additionalProperties: true
        tier:
          type: string
        onboarding_path:
          type: string
        risk_flags:
          type: array
          items:
            type: string
        manual_review_required:
          type: boolean
        next_action:
          type: string
        storage:
          type: object
          additionalProperties: true
    ResourceRecommendationResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
        recommendations:
          type: array
          items:
            type: object
            additionalProperties: true
        status:
          type: string
        note:
          type: string
    OnboardingPlanResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
        onboarding_plan:
          type: object
          additionalProperties: true
        manual_review_required:
          type: boolean
        risk_flags:
          type: array
          items:
            type: string
        next_action:
          type: string
    CampaignKitResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
        campaign_kit:
          type: object
          additionalProperties: true
        compliance_notice:
          type: string
    LogEventRequest:
      type: object
      additionalProperties: true
      properties:
        event_type:
          type: string
          enum: [intake_reviewed, resource_recommended, onboarding_plan_generated, campaign_kit_generated, partner_approved, partner_watchlisted, manual_review_required]
        partner_id:
          type: string
        summary:
          type: string
        created_by:
          type: string
      required: [event_type]
    LogEventResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
        logged:
          type: boolean
        event:
          type: object
          additionalProperties: true
