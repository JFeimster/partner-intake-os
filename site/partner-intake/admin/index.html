<body>
  <main class="login-shell admin-review-shell" aria-labelledby="pageTitle">
    <section class="login-card review-card">
      <div class="review-header">
        <div>
          <p class="eyebrow">Protected Admin Route</p>
          <h1 id="pageTitle">Partner review queue</h1>

      <nav class="links" aria-label="Admin links">
        <a href="./login.html">Login</a>
